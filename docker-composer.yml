services:
  # ── Zookeeper ─────────────────────────────────────────────────────────────
  zookeeper:
    image: confluentinc/cp-zookeeper:7.4.0
    environment:
      ZOOKEEPER_CLIENT_PORT: 2181
      ZOOKEEPER_TICK_TIME: 2000

  # ── Kafka ─────────────────────────────────────────────────────────────────
  kafka:
    image: confluentinc/cp-kafka:7.4.0
    depends_on:
      - zookeeper
    ports:
      - '9092:9092'
    environment:
      KAFKA_BROKER_ID: 1
      KAFKA_ZOOKEEPER_CONNECT: zookeeper:2181
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:9092
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_AUTO_CREATE_TOPICS_ENABLE: 'true'
    healthcheck:
      test:
        [
          'CMD',
          'kafka-broker-api-versions',
          '--bootstrap-server',
          'localhost:9092',
        ]
      interval: 10s
      timeout: 10s
      retries: 5

  # ── MongoDB ───────────────────────────────────────────────────────────────
  mongodb:
    image: mongo:7
    ports:
      - '27017:27017'
    volumes:
      - mongo-data:/data/db

  # ── Email Service ─────────────────────────────────────────────────────────
  email-service:
    build:
      context: ./email
      dockerfile: Dockerfile
    env_file:
      - ./email/.env
    depends_on:
      kafka:
        condition: service_healthy
    restart: unless-stopped

  # ── User Service ──────────────────────────────────────────────────────────
  user-service:
    build:
      context: ./user
      dockerfile: Dockerfile
    ports:
      - '5001:5001'
    env_file:
      - ./user/.env
    depends_on:
      kafka:
        condition: service_healthy
      mongodb:
        condition: service_started
    restart: unless-stopped

  # ── product Service ──────────────────────────────────────────────────────────
  product-service:
    build:
      context: ./product
      dockerfile: Dockerfile
    ports:
      - '5002:5002'
    env_file:
      - ./product/.env
    volumes:
      - ./product/src:/app/src
      - ./product/uploads:/app/uploads
    depends_on:
      kafka:
        condition: service_healthy
      mongodb:
        condition: service_started
      user-service:
        condition: service_started
      email-service:
        condition: service_started
    restart: unless-stopped

  order-service:
    build:
      context: ./order
      dockerfile: Dockerfile
    ports:
      - '5003:5003'
    env_file:
      - ./order/.env
    volumes:
      - ./order/src:/app/src
    depends_on:
      kafka:
        condition: service_healthy
      mongodb:
        condition: service_started
      product-service:
        condition: service_started
    restart: unless-stopped

volumes:
  mongo-data:
